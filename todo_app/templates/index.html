<!DOCTYPE html>
<html>
<head>
    <title>Список дел</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f2f2f2;
        }

        h1 {
            color: blue;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Мои задачи</h1>

    <ul>

        {% for task in tasks %}

            <li>
                {{ task }}
                <a href="/delete/{{ loop.index0 }}">
                    Удалить
                </a>
            </li>

        {% endfor %}

    </ul>

    <h2>Добавить задачу</h2>

    <form method="POST" action="/add">

        <input type="text"
               name="task"
               placeholder="Новая задача"
               required>

        <button type="submit">
            Добавить
        </button>

    </form>

</body>
</html>
